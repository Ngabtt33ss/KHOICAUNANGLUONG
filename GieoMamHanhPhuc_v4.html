<script>
// ========== ROLE HIERARCHY ==========
const ROLES={NPP1:{name:'NPP 1',level:4,canView:['NPP2','VIP','CTV'],badge:'role-npp1'},NPP2:{name:'NPP 2',level:3,canView:['VIP','CTV'],badge:'role-npp2'},VIP:{name:'VIP Hạnh Phúc',level:2,canView:['CTV'],badge:'role-vip'},CTV:{name:'CTV / Hạt Mầm Yêu Thương',level:1,canView:[],badge:'role-ctv'}};
function getDefaultAccounts(){return[{id:'admin',username:'admin',password:'admin123',name:'Quản Trị Viên',role:'NPP1',parent:null},{id:'npp2_demo',username:'npp2',password:'npp2123',name:'NPP2 Demo',role:'NPP2',parent:'admin'},{id:'vip_demo',username:'vip',password:'vip123',name:'VIP Hạnh Phúc Demo',role:'VIP',parent:'npp2_demo'},{id:'ctv_demo',username:'ctv',password:'ctv123',name:'Hạt Mầm Demo',role:'CTV',parent:'vip_demo'}];}
function getDefaultConfig(){return{
appName:'GIEO MẦM HẠNH PHÚC',slogan:'Thịnh Vượng Đủ Đầy · Trong Nhẹ Nhàng Bình An',
incomeCats:[{grp:"Thu nhập chủ động",items:["Lương chính","Tiền thưởng","Tiền công / Dịch vụ"]},{grp:"Thu nhập thụ động",items:["Cho thuê","Cổ tức","Lợi nhuận đầu tư"]},{grp:"Đầu tư vốn",items:["Lãi chứng khoán","Lãi tiền gửi tiết kiệm","Lãi crypto","Lãi góp vốn kinh doanh"]},{grp:"Thu nhập bất thường",items:["Thu nhập khác"]},{grp:"Đầu tư sản xuất",items:["Kinh doanh"]},{grp:"Đầu tư bất động sản",items:["Quỹ bất động sản"]}],
expenseCats:[{grp:"Chi thiết yếu",items:["Ăn uống","Nhà ở","Đi lại","Y tế","Giáo dục/ Công việc","Gia hạn gói cước"]},{grp:"Chi không thiết yếu",items:["Mua sắm","Du lịch","Giải trí","Sở thích","Chi tiêu khác"]},{grp:"Chi bất thường",items:["Sửa chữa / bảo trì","Quà tặng / hiếu hỉ"]},{grp:"Chi trả nợ",items:["Nợ tín dụng","Vay cá nhân"]}],

savingCats:[{grp:"Tiết kiệm",items:["Gửi ngân hàng","Quỹ dự phòng"]},{grp:"Đầu tư",items:["Chứng khoán","Bất động sản","Kinh doanh","Vàng/ngoại tệ","Tiền điện tử"]}],

typeGroups:[{name:'SHMT',items:['SHMT']},{name:'PRHOUSE',items:['PRHOUSE']},{name:'Nguồn khác',items:['AFFILIATE','COACH','APP']}]};}

// ========== STORAGE ==========
const SKEY_ACCOUNTS='gmhp_accounts',SKEY_CONFIG='gmhp_config';
function skey(u){return'gmhp_data_'+u;}function ekey(u){return'gmhp_energy_'+u;}
function loadJSON(k,d){try{const s=localStorage.getItem(k);return s?JSON.parse(s):d;}catch{return d;}}
function saveJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
let accounts=loadJSON(SKEY_ACCOUNTS,null);if(!accounts){accounts=getDefaultAccounts();saveJSON(SKEY_ACCOUNTS,accounts);}

function makePie(data,colors,size=160){if(!data.length||data.every(d=>d.value===0))return`<div style="text-align:center;color:var(--mut);font-size:12px;padding:16px">Chưa có dữ liệu</div>`;const total=data.reduce((s,d)=>s+d.value,0);let acc=0;const stops=[];data.forEach((d,i)=>{const p=d.value/total*100;stops.push(`${colors[i%colors.length]} ${acc}% ${acc+p}%`);acc+=p;});const legend=data.filter(d=>d.value>0).map((d,i)=>`<span><i style="background:${colors[i%colors.length]}"></i>${d.name}: ${fmtS(d.value)}</span>`).join("");return`<div class="pie-wrap"><div class="pie" style="width:${size}px;height:${size}px;background:conic-gradient(${stops.join(",")})"><div class="pie-center">${fmtS(total)}</div></div><div class="legend-pie">${legend}</div></div>`;}

const DAYS=['Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy','Chủ Nhật'];
const HOURS=Array.from({length:24},(_,i)=>String(i).padStart(2,'0')+':00');
function getMonday(d){const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()-day+(day===0?-6:1));dt.setHours(0,0,0,0);return dt;}
function fmtD(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');}
function weekNum(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-dn);const y1=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil(((dt-y1)/864e5+1)/7);}
function wKey(mon){return mon.getFullYear()+'-W'+String(weekNum(mon)).padStart(2,'0');}
function mKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function getGroup(c){return c?.startsWith('[G]')?'G':c?.startsWith('[N]')?'N':c?.startsWith('[D]')?'D':'';}
function emptyWeek(){const d={};for(let day=0;day<7;day++)for(let h=0;h<24;h++)d[day+'-'+h]={a:'',c:''};return d;}
function escHtml(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function calcEnergyStats(data){let g=0,n=0,d=0,total=0;Object.values(data).forEach(cell=>{if(!cell?.c)return;total++;const gr=getGroup(cell.c);if(gr==='G')g++;else if(gr==='N')n++;else if(gr==='D')d++;});return{g,n,d,total};}
function energyStats(F){const all=[...F.incomes,...F.expenses];const gA=all.filter(r=>r.energy==="Xanh"),rA=all.filter(r=>r.energy==="Đỏ");return{greenCount:gA.length,redCount:rA.length,totalCount:all.length,greenAmt:sum(gA),redAmt:sum(rA),greenIncAmt:sum(F.incomes.filter(r=>r.energy==="Xanh")),redIncAmt:sum(F.incomes.filter(r=>r.energy==="Đỏ")),greenExpAmt:sum(F.expenses.filter(r=>r.energy==="Xanh")),redExpAmt:sum(F.expenses.filter(r=>r.energy==="Đỏ")),greenIncCount:F.incomes.filter(r=>r.energy==="Xanh").length,redIncCount:F.incomes.filter(r=>r.energy==="Đỏ").length,greenExpCount:F.expenses.filter(r=>r.energy==="Xanh").length,redExpCount:F.expenses.filter(r=>r.energy==="Đỏ").length};}

function render(){

  const dr=sum(F.debts.filter(r=>findGrp(config.debtCats,r.type)==="Nợ phải thu"||r.grp==="Nợ phải thu"));
  const ts=sum(F.savings),remain=ti-te-dp-ts;
  const E=energyStats(F),S={ti,te,dp,dr,ts,remain,E};
  if(currentTab==='energy_week')renderEnergyWeek();
  else if(currentTab==='overview')renderOverview(F,S,E);

function buildSourceReport(F){
  const typeGroups=config.typeGroups||[];
  // Group by "type" field (SHMT, PRHOUSE, AFFILIATE KHOÁ HỌC, etc.)
  function getTypeGroup(type){
    if(!type)return'Khác';
    for(const tg of typeGroups){if(tg.items.some(item=>type.toUpperCase().includes(item.toUpperCase())))return tg.name;}
    return type;
  }
  const incByGroup={},expByGroup={};
  F.incomes.forEach(r=>{const g=getTypeGroup(r.type);incByGroup[g]=(incByGroup[g]||0)+NV(r.amount);});
  F.expenses.forEach(r=>{const g=getTypeGroup(r.type);expByGroup[g]=(expByGroup[g]||0)+NV(r.amount);});
  const allGroups=[...new Set([...Object.keys(incByGroup),...Object.keys(expByGroup)])].sort();
  if(!allGroups.length)return'';
  const totalInc=Object.values(incByGroup).reduce((a,b)=>a+b,0);
  const totalExp=Object.values(expByGroup).reduce((a,b)=>a+b,0);
  let rows=allGroups.map(g=>{const inc=incByGroup[g]||0;const exp=expByGroup[g]||0;const net=inc-exp;const pctI=totalInc?(inc/totalInc*100).toFixed(1):0;const pctE=totalExp?(exp/totalExp*100).toFixed(1):0;return`<tr><td class="b">${g}</td><td class="r c-ok">${fmt(inc)}</td><td class="r" style="font-size:10px;color:var(--mut)">${pctI}%</td><td class="r c-no">${fmt(exp)}</td><td class="r" style="font-size:10px;color:var(--mut)">${pctE}%</td><td class="r b" style="color:${net>=0?'var(--ok)':'var(--no)'}">${fmt(net)}</td></tr>`;}).join('');
  rows+=`<tr style="background:var(--s50);font-weight:800"><td>TỔNG</td><td class="r c-ok">${fmt(totalInc)}</td><td class="r">100%</td><td class="r c-no">${fmt(totalExp)}</td><td class="r">100%</td><td class="r" style="color:${totalInc-totalExp>=0?'var(--ok)':'var(--no)'}">${fmt(totalInc-totalExp)}</td></tr>`;
  const incSrcData=Object.entries(incByGroup).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  const expSrcData=Object.entries(expByGroup).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  return`<div class="card"><div class="card-t">📊 BÁO CÁO THEO NGUỒN THU / CHI</div><p style="font-size:11px;color:var(--mut);margin-bottom:10px">Phân tích theo loại nguồn (SHMT, PRHOUSE, AFFILIATE...). Cấu hình nhóm trong ⚙️ Cài đặt → "Nhóm nguồn báo cáo".</p><div style="overflow-x:auto"><table><thead><tr><th>Nguồn</th><th class="r">Thu nhập</th><th class="r">% Thu</th><th class="r">Chi tiêu</th><th class="r">% Chi</th><th class="r">Chênh lệch</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

        html+='</optgroup></select></td>';

      html+='</tr>';

    // Week stats cards
    const pG=stats.total?Math.round(stats.g/stats.total*100):0,pN=stats.total?Math.round(stats.n/stats.total*100):0,pD=stats.total?Math.round(stats.d/stats.total*100):0;
    html+=`<div class="stats-panel animate-in"><div class="stats-title">📊 ĐO LƯỜNG CẢ TUẦN</div><div class="stats-grid"><div class="stat-card stat-goc"><div class="stat-label">🟢 GỐC</div><div class="stat-number">${stats.g}</div><div class="stat-pct">${pG}%</div><div class="stat-target">Mục tiêu: ≥ 50%</div></div><div class="stat-card stat-nhanh"><div class="stat-label">🌿 NHÁNH</div><div class="stat-number">${stats.n}</div><div class="stat-pct">${pN}%</div><div class="stat-target">Mục tiêu: 30–40%</div></div><div class="stat-card stat-doc"><div class="stat-label">🔴 ĐỘC</div><div class="stat-number">${stats.d}</div><div class="stat-pct">${pD}%</div><div class="stat-target">Mục tiêu: < 10%</div></div><div class="stat-card stat-total"><div class="stat-label">📊 TỔNG</div><div class="stat-number">${stats.total}</div><div class="stat-pct">${stats.total}/168</div></div></div><div class="goal-banner">🎯 MỤC TIÊU: 🟢 GỐC ≥ 50% │ 🌿 NHÁNH 30–40% │ 🔴 ĐỘC < 10%</div></div>`;
  } else if(energyView==='month'){
    html+=buildMonthYearSummary('month');
  } else {
    html+=buildMonthYearSummary('year');
  }
  el.innerHTML=html;
}

function buildMonthYearSummary(mode){
  const targetM=mKey(energyMonday),targetY=energyMonday.getFullYear().toString();
  const rows=[];
  Object.entries(energyAllWeeks).forEach(([wk,data])=>{
    const yr=wk.split('-W')[0],wn=parseInt(wk.split('-W')[1]);
    const jan1=new Date(parseInt(yr),0,1),approx=new Date(jan1.getTime()+(wn-1)*7*864e5);
    if(mode==='month'&&mKey(approx)!==targetM)return;
    if(mode==='year'&&yr!==targetY)return;
    const s=calcEnergyStats(data);if(s.total===0)return;
    rows.push({wk,month:approx.getMonth()+1,...s});
  });
  rows.sort((a,b)=>a.wk.localeCompare(b.wk));

  let titleText=mode==='month'?`📆 Tổng kết Tháng ${energyMonday.getMonth()+1}/${energyMonday.getFullYear()}`:`📊 Tổng kết Năm ${energyMonday.getFullYear()}`;
  let html=`<div class="stats-panel animate-in"><div class="stats-title">${titleText}</div>`;
  if(rows.length===0){html+=`<div style="text-align:center;padding:30px;color:var(--mut)">Chưa có dữ liệu</div>`;}
  else{
    // If year mode, aggregate by month
    let displayRows=rows;
    if(mode==='year'){
      const byMonth={};
      rows.forEach(r=>{
        const mk=r.month;
        if(!byMonth[mk])byMonth[mk]={wk:'Tháng '+mk,g:0,n:0,d:0,total:0};
        byMonth[mk].g+=r.g;byMonth[mk].n+=r.n;byMonth[mk].d+=r.d;byMonth[mk].total+=r.total;
      });
      displayRows=Object.values(byMonth).sort((a,b)=>parseInt(a.wk.split(' ')[1])-parseInt(b.wk.split(' ')[1]));
    }
    html+='<table class="summary-table"><thead><tr><th>'+(mode==='month'?'Tuần':'Tháng')+'</th><th>🟢 GỐC</th><th>🌿 NHÁNH</th><th>🔴 ĐỘC</th><th>Tổng</th><th>% GỐC</th><th>% NHÁNH</th><th>% ĐỘC</th></tr></thead><tbody>';
    const totals=displayRows.reduce((a,r)=>({g:a.g+r.g,n:a.n+r.n,d:a.d+r.d,total:a.total+r.total}),{g:0,n:0,d:0,total:0});
    displayRows.forEach(r=>{
      const pG=r.total?Math.round(r.g/r.total*100):0,pN=r.total?Math.round(r.n/r.total*100):0,pD=r.total?Math.round(r.d/r.total*100):0;
      html+=`<tr><td>${r.wk}</td><td style="background:var(--goc-soft);color:var(--goc-text);font-weight:700">${r.g}</td><td style="background:var(--nhanh-soft);color:var(--nhanh-text);font-weight:700">${r.n}</td><td style="background:var(--doc-soft);color:var(--doc-text);font-weight:700">${r.d}</td><td>${r.total}</td><td style="font-weight:700;color:${pG>=50?'var(--goc-text)':'var(--doc-text)'}">${pG}%</td><td style="font-weight:700;color:var(--nhanh-text)">${pN}%</td><td style="font-weight:700;color:${pD<10?'var(--goc-text)':'var(--doc-text)'}">${pD}%</td></tr>`;
    });
    const tpG=totals.total?Math.round(totals.g/totals.total*100):0,tpN=totals.total?Math.round(totals.n/totals.total*100):0,tpD=totals.total?Math.round(totals.d/totals.total*100):0;
    html+=`<tr class="total-row"><td style="background:var(--h1);color:#fff;font-weight:800">TỔNG</td><td style="background:var(--goc-bg);color:var(--goc-text)">${totals.g}</td><td style="background:var(--nhanh-bg);color:var(--nhanh-text)">${totals.n}</td><td style="background:var(--doc-bg);color:var(--doc-text)">${totals.d}</td><td style="background:var(--h1);color:#fff">${totals.total}</td><td style="background:var(--goc-bg);color:var(--goc-text)">${tpG}%</td><td style="background:var(--nhanh-bg);color:var(--nhanh-text)">${tpN}%</td><td style="background:var(--doc-bg);color:var(--doc-text)">${tpD}%</td></tr>`;
    html+='</tbody></table>';
    // Summary stat cards
    html+=`<div class="stats-grid" style="margin-top:16px"><div class="stat-card stat-goc"><div class="stat-label">🟢 GỐC</div><div class="stat-number">${totals.g}</div><div class="stat-pct">${tpG}%</div></div><div class="stat-card stat-nhanh"><div class="stat-label">🌿 NHÁNH</div><div class="stat-number">${totals.n}</div><div class="stat-pct">${tpN}%</div></div><div class="stat-card stat-doc"><div class="stat-label">🔴 ĐỘC</div><div class="stat-number">${totals.d}</div><div class="stat-pct">${tpD}%</div></div></div>`;
  }
  html+='</div>';
  return html;
}

    <div class="card"><div class="card-t">📂 DANH MỤC THU NHẬP / CHI TIÊU / NỢ / TK&ĐT</div>
      <p style="font-size:11px;color:var(--mut);margin-bottom:10px">Bấm vào từng nhóm để mở rộng, chỉnh sửa tên nhóm, thêm/xoá mục con.</p>
      ${buildCatEditor('incomeCats','💰 Danh mục Thu nhập',config.incomeCats)}
      ${buildCatEditor('expenseCats','💸 Danh mục Chi tiêu',config.expenseCats)}
      ${buildCatEditor('debtCats','📋 Danh mục Công nợ',config.debtCats)}
      ${buildCatEditor('savingCats','📈 Danh mục Tiết kiệm & Đầu tư',config.savingCats)}
    </div>
    <div class="card"><div class="card-t">⏰ DANH MỤC NĂNG LƯỢNG TUẦN</div>
      <div style="margin-bottom:8px">${enCatsHtml}</div>
      <div class="form-row"><div class="field"><label>Tên danh mục</label><input type="text" id="s_enName" placeholder="VD: [G] Thiền định"></div><div class="field"><label>Nhóm</label><select id="s_enGrp"><option value="G">🟢 GỐC</option><option value="N">🌿 NHÁNH</option><option value="D">🔴 ĐỘC</option></select></div><div style="padding-bottom:1px"><button class="btn btn-light" id="s_addEn">+ Thêm</button></div></div>
    </div>
    <div class="card"><div class="card-t">💾 DỮ LIỆU</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        <div class="box" style="flex:1;min-width:100px"><div class="box-l">Thu nhập</div><div class="box-v">${D.incomes.length}</div></div>
        <div class="box" style="flex:1;min-width:100px"><div class="box-l">Chi tiêu</div><div class="box-v">${D.expenses.length}</div></div>
        <div class="box" style="flex:1;min-width:100px"><div class="box-l">Công nợ</div><div class="box-v">${D.debts.length}</div></div>
        <div class="box" style="flex:1;min-width:100px"><div class="box-l">TK&ĐT</div><div class="box-v">${D.savings.length}</div></div>
        <div class="box" style="flex:1;min-width:100px"><div class="box-l">NL Tuần</div><div class="box-v">${Object.keys(energyAllWeeks).length} tuần</div></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn" id="exportBtn">📤 Xuất JSON</button><button class="btn btn-light" id="importBtn">📥 Nhập JSON</button><input type="file" id="importFile" accept=".json" style="display:none"><button class="btn btn-del" id="resetBtn">🗑️ Xoá toàn bộ</button></div>
    </div>`;
  document.getElementById("s_save_name").addEventListener("click",()=>{config.appName=document.getElementById("s_name").value||config.appName;config.slogan=document.getElementById("s_slogan").value||config.slogan;saveJSON(SKEY_CONFIG,config);renderApp();});
  document.getElementById("s_addSrc").addEventListener("click",()=>{const v=document.getElementById("s_newSrc").value.trim();if(!v)return;config.moneySources.push(v);saveJSON(SKEY_CONFIG,config);render();});
  const tgBtn=document.getElementById("s_addTG");if(tgBtn)tgBtn.addEventListener("click",()=>{const v=document.getElementById("s_newTGName").value.trim();if(!v)return;if(!config.typeGroups)config.typeGroups=[];config.typeGroups.push({name:v,items:[]});saveJSON(SKEY_CONFIG,config);render();});
  document.getElementById("s_addEn").addEventListener("click",()=>{const name=document.getElementById("s_enName").value.trim(),grp=document.getElementById("s_enGrp").value;if(!name)return;config.energyCats.push({value:name,group:grp});saveJSON(SKEY_CONFIG,config);render();});
  document.getElementById("exportBtn").addEventListener("click",()=>{
    const blob=new Blob([JSON.stringify({finance:D,config,accounts,energyAllWeeks},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="GMHP_backup_"+currentUser.username+"_"+new Date().toISOString().slice(0,10)+".json";a.click();
  });
  document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
  document.getElementById("importFile").addEventListener("change",e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);
      if(p.finance){D={...D,...p.finance};saveUserData();}
      if(p.config){config={...config,...p.config};saveJSON(SKEY_CONFIG,config);}
      if(p.accounts){accounts=p.accounts;saveJSON(SKEY_ACCOUNTS,accounts);}
      if(p.energyAllWeeks){Object.entries(p.energyAllWeeks).forEach(([wk,data])=>{saveEnergyWeek(wk,data);});}
      loadUserData();loadEnergyWeek(energyMonday);renderApp();alert("✅ Nhập dữ liệu thành công!");
    }catch(err){alert("❌ File không hợp lệ: "+err.message);}};r.readAsText(f);
  });
  document.getElementById("resetBtn").addEventListener("click",()=>{
    if(!confirm("⚠️ Xoá toàn bộ dữ liệu tài chính & năng lượng?"))return;
    D={incomes:[],expenses:[],debts:[],savings:[],targets:[],balances:[],debtmap:[]};saveUserData();
    // Clear energy weeks
    for(let i=localStorage.length-1;i>=0;i--){const k=localStorage.key(i);if(k&&k.startsWith(ekey(currentUser.id)))localStorage.removeItem(k);}
    energyAllWeeks={};energyWeekData=emptyWeek();render();
  });
}

// ========== INIT ==========
renderLogin();
</script>
</body>
</html>
